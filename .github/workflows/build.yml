name: Build & Deploy limm VPN .dmg

on:
  push:
    branches: [ main ]
  workflow_dispatch:   # ручной запуск

permissions:
  contents: write   # needed to create GitHub Releases

jobs:
  build:
    runs-on: macos-14   # Apple Silicon runner (free tier)
    timeout-minutes: 40

    steps:
      # ── Checkout ──────────────────────────────────────────────
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      # ── Ruby + xcodeproj gem ───────────────────────────────────
      - name: Setup Ruby
        uses: ruby/setup-ruby@v1
        with:
          ruby-version: '3.2'
          bundler-cache: false

      # ── Upgrade bundled Xray to latest (server runs 26.x; 25.x has XHTTP incompatibility) ──
      - name: Upgrade bundled xray-core
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          XRAY_VER=$(curl -s -H "Authorization: Bearer ${GH_TOKEN}" https://api.github.com/repos/XTLS/Xray-core/releases/latest | python3 -c "import sys,json; d=json.load(sys.stdin); print(d['tag_name'])")
          echo "Downloading Xray $XRAY_VER"
          curl -Lo xray-intel.zip "https://github.com/XTLS/Xray-core/releases/download/${XRAY_VER}/Xray-macos-64.zip"
          curl -Lo xray-arm64.zip "https://github.com/XTLS/Xray-core/releases/download/${XRAY_VER}/Xray-macos-arm64-v8a.zip"
          unzip -o xray-intel.zip xray -d intel/
          unzip -o xray-arm64.zip xray -d arm64/
          mv -f intel/xray Build/v2ray-core/v2ray
          mv -f arm64/xray Build/v2ray-core/v2ray-arm64
          chmod +x Build/v2ray-core/v2ray Build/v2ray-core/v2ray-arm64
          ./Build/v2ray-core/v2ray-arm64 version || true
          echo "Xray upgraded to $XRAY_VER"

      - name: Install xcodeproj gem
        run: gem install xcodeproj xcpretty --no-document

      # ── CocoaPods ─────────────────────────────────────────────
      - name: Install CocoaPods
        run: |
          gem install cocoapods --no-document
          pod install --repo-update
        env:
          COCOAPODS_DISABLE_STATS: true

      # ── Inject Limm secrets (build-time) ──────────────────────
      # Bakes the monitor token AND the AmneziaWG client private key from GitHub secrets.
      # secrets.AWG_CLIENT_PRIVKEY must be added in repo Settings → Secrets (base64 wg privkey).
      - name: Generate LimmSecrets.swift
        run: |
          sed -e "s|__LIMM_TOKEN__|${{ secrets.LIMM_MONITOR_TOKEN }}|" \
              -e "s|__AWG_CLIENT_PRIVKEY__|${{ secrets.AWG_CLIENT_PRIVKEY }}|" \
            V2rayU/Limm/LimmSecrets.swift.template \
            > V2rayU/Limm/LimmSecrets.swift
          echo "LimmSecrets.swift generated (token + AWG key injected)."

      # ── Download & bundle amneziawg-go (userspace AmneziaWG TUN) ──
      # The "FR1-awg" transport (LimmAWGProcess.swift) launches this binary. It is NOT in
      # the repo. Bundle a universal (arm64 + x86_64) build plus the `awg` config tool into
      # Build/awg-core/, which is added to the app as a Resources folder reference (see the
      # "Add awg-core to xcodeproj" step). Lands at Contents/Resources/awg-core/amneziawg-go.
      #
      # NOTE: amnezia-vpn/amneziawg-go publishes SOURCE, not prebuilt macOS binaries. CI must
      # build it from source (Go) and lipo the two arches into a universal binary. The `awg`
      # wg(8)-compatible tool comes from amnezia-vpn/amneziawg-tools (also built from source).
      # TODO(verify): confirm the exact release/tag and that amneziawg-go builds cleanly on
      # the macos-14 runner; pin a known-good commit once verified.
      - name: Build & bundle amneziawg-go + awg tools
        # Unverified source build (amneziawg-go/-tools): keep it non-fatal so a failure
        # here does NOT red the macOS DMG pipeline. If it fails, the binary is simply
        # absent and FR1-awg falls back at runtime (LimmAWGProcess handles missing binary).
        continue-on-error: true
        run: |
          set -e
          mkdir -p Build/awg-core
          # Go is preinstalled on GitHub macOS runners.
          go version
          WORK=$(mktemp -d)
          # amneziawg-go (userspace device)
          git clone --depth 1 https://github.com/amnezia-vpn/amneziawg-go "$WORK/awg-go"
          ( cd "$WORK/awg-go"
            GOOS=darwin GOARCH=arm64 go build -o "$WORK/amneziawg-go-arm64" .
            GOOS=darwin GOARCH=amd64 go build -o "$WORK/amneziawg-go-amd64" . )
          lipo -create -output Build/awg-core/amneziawg-go \
            "$WORK/amneziawg-go-arm64" "$WORK/amneziawg-go-amd64"
          chmod +x Build/awg-core/amneziawg-go
          # awg / awg-quick config tool (wg(8)-compatible)
          git clone --depth 1 https://github.com/amnezia-vpn/amneziawg-tools "$WORK/awg-tools"
          # amneziawg-tools ships the userspace `wg`-equivalent under src/ (C). Build it.
          # TODO(verify): exact build target/path; some releases ship a prebuilt `awg`.
          if make -C "$WORK/awg-tools/src" 2>/dev/null; then
            lipo -info "$WORK/awg-tools/src/wg" 2>/dev/null || true
            cp "$WORK/awg-tools/src/wg" Build/awg-core/awg || cp "$WORK/awg-tools/src/awg" Build/awg-core/awg
            chmod +x Build/awg-core/awg
          else
            echo "::warning::awg config tool build failed — AWG will create utun but not configure. Verify amneziawg-tools build."
          fi
          rm -rf "$WORK"
          ls -la Build/awg-core/
          file Build/awg-core/amneziawg-go

      # ── Inject build version + commit hash ───────────────────
      - name: Generate LimmBuildInfo.swift
        run: |
          SHORT_SHA=$(git rev-parse --short HEAD | cut -c1-4)
          BASE_VER=$(grep -m1 'MARKETING_VERSION' V2rayU.xcodeproj/project.pbxproj | sed 's/.*= *//; s/;.*//')
          VERSION="${BASE_VER}.${{ github.run_number }}"
          printf '// Auto-generated by CI — do not edit\nenum LimmBuildInfo {\n    static let version = "%s"\n    static let commit  = "%s"\n}\n' \
            "$VERSION" "$SHORT_SHA" > V2rayU/Limm/LimmBuildInfo.swift
          echo "LimmBuildInfo.swift: $VERSION #$SHORT_SHA"

      # ── Add Limm Swift files to Xcode project ─────────────────
      - name: Add Limm files to xcodeproj
        run: ruby scripts/add_limm_files.rb

      # ── Bundle amneziawg-go binary as a Resources folder ──────
      - name: Add awg-core to xcodeproj
        run: ruby scripts/add_awg_resource.rb

      # ── Download & bundle hysteria2 (universal arm64+amd64 binary) ──
      # LimmHy2Process.swift launches this binary for DE1-hy2 / FR1-hy2 transports.
      # Xray-core does not support the hysteria2 protocol natively → separate binary needed.
      # Published at github.com/apernet/hysteria (official upstream).
      - name: Download & bundle hysteria2
        continue-on-error: true
        run: |
          set -e
          mkdir -p Build/hy2-core
          HY2_VER=$(curl -s -H "Authorization: Bearer ${GH_TOKEN}" \
            https://api.github.com/repos/apernet/hysteria/releases/latest \
            | python3 -c "import sys,json; d=json.load(sys.stdin); print(d['tag_name'])")
          echo "Downloading hysteria2 $HY2_VER"
          curl -fLo Build/hy2-core/hy2-arm64 \
            "https://github.com/apernet/hysteria/releases/download/${HY2_VER}/hysteria-darwin-arm64"
          curl -fLo Build/hy2-core/hy2-amd64 \
            "https://github.com/apernet/hysteria/releases/download/${HY2_VER}/hysteria-darwin-amd64"
          lipo -create -output Build/hy2-core/hysteria2 \
            Build/hy2-core/hy2-arm64 Build/hy2-core/hy2-amd64
          chmod +x Build/hy2-core/hysteria2
          rm Build/hy2-core/hy2-arm64 Build/hy2-core/hy2-amd64
          ls -la Build/hy2-core/
          file Build/hy2-core/hysteria2
          Build/hy2-core/hysteria2 version 2>&1 | head -3 || true
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      # ── Bundle hysteria2 binary as a Resources folder ──────────
      - name: Add hy2-core to xcodeproj
        run: ruby scripts/add_hy2_resource.rb || echo "::warning::hy2-core xcodeproj step skipped (binary absent)"

      # ── Build ──────────────────────────────────────────────────
      - name: Build V2rayU.app
        run: |
          set -o pipefail
          xcodebuild \
            -workspace V2rayU.xcworkspace \
            -scheme V2rayU \
            -configuration Release \
            -archivePath build/V2rayU.xcarchive \
            archive \
            CODE_SIGN_IDENTITY="-" \
            CODE_SIGNING_REQUIRED=NO \
            CODE_SIGNING_ALLOWED=NO \
            ARCHS="arm64 x86_64" \
            ONLY_ACTIVE_ARCH=NO \
            2>&1 | xcpretty --simple

          ls build/V2rayU.xcarchive/Products/Applications/

      # ── Package as .dmg (app + Applications symlink for drag-and-drop) ──
      - name: Create .dmg
        run: |
          APP_PATH="build/V2rayU.xcarchive/Products/Applications/V2rayU.app"
          DMG_NAME="proxy_mac.dmg"

          # Staging dir: app + /Applications shortcut (standard drag-and-drop layout)
          STAGE=$(mktemp -d)
          cp -r "$APP_PATH" "$STAGE/V2rayU.app"
          ln -s /Applications "$STAGE/Applications"

          # Instructions for Gatekeeper (one line avoids YAML indentation issues)
          python3 -c "open('$STAGE/README.txt','w').write('limm VPN Install\n\n1. Drag V2rayU.app to Applications\n2. First launch warning:\n   Right-click V2rayU.app -> Open -> Open\n   or: System Settings -> Privacy & Security -> Open Anyway\n   (one-time step)\n')"

          hdiutil create \
            -volname "limm VPN" \
            -srcfolder "$STAGE" \
            -ov -format UDZO \
            "build/$DMG_NAME"

          rm -rf "$STAGE"
          echo "DMG_NAME=$DMG_NAME" >> $GITHUB_ENV
          echo "DMG_PATH=build/$DMG_NAME" >> $GITHUB_ENV

      # ── Get version + short SHA ────────────────────────────────
      # VERSION = MARKETING_VERSION из project.pbxproj — единый источник версии:
      # тот же бандл (CFBundleShortVersionString) и mac-info.json (для апдейтера).
      - name: Set version info
        run: |
          echo "SHORT_SHA=$(git rev-parse --short HEAD)" >> $GITHUB_ENV
          BASE_VER=$(grep -m1 'MARKETING_VERSION' V2rayU.xcodeproj/project.pbxproj | sed 's/.*= *//; s/;.*//')
          VERSION="${BASE_VER}.${{ github.run_number }}"
          echo "VERSION=$VERSION" >> $GITHUB_ENV
          echo "Resolved VERSION=$VERSION"

      # ── Deploy to limm.space (native scp/ssh — appleboy actions are Linux-only) ──
      - name: Setup SSH key
        run: |
          mkdir -p ~/.ssh
          echo "${{ secrets.DEPLOY_KEY }}" > ~/.ssh/deploy_key
          chmod 600 ~/.ssh/deploy_key
          ssh-keyscan -H ${{ secrets.DEPLOY_HOST }} >> ~/.ssh/known_hosts 2>/dev/null

      - name: Upload .dmg to limm.space
        run: |
          ssh -i ~/.ssh/deploy_key ${{ secrets.DEPLOY_USER }}@${{ secrets.DEPLOY_HOST }} \
            "mkdir -p /tmp/limm-mac-upload"
          scp -i ~/.ssh/deploy_key \
            build/${{ env.DMG_NAME }} \
            ${{ secrets.DEPLOY_USER }}@${{ secrets.DEPLOY_HOST }}:/tmp/limm-mac-upload/

      - name: Activate .dmg on server
        run: |
          ssh -i ~/.ssh/deploy_key ${{ secrets.DEPLOY_USER }}@${{ secrets.DEPLOY_HOST }} \
            "mv -f /tmp/limm-mac-upload/proxy_mac.dmg /var/www/limm/vpn/proxy_mac.dmg && \
             chmod 644 /var/www/limm/vpn/proxy_mac.dmg && \
             echo '{\"version\":\"${{ env.VERSION }}\",\"build\":\"${{ env.SHORT_SHA }}\"}' \
               > /var/www/limm/vpn/proxy-mac-info.json && \
             chmod 644 /var/www/limm/vpn/proxy-mac-info.json && \
             echo 'window.PROXY_VER={\"ver\":\"${{ env.VERSION }}\",\"url\":\"/vpn/proxy_mac.dmg\"};' \
               > /var/www/limm/vpn/proxy-version.js && \
             chmod 644 /var/www/limm/vpn/proxy-version.js && \
             echo 'Deployed proxy_mac.dmg v${{ env.VERSION }}'"

      # ── Create GitHub Release ──────────────────────────────────
      - name: Create GitHub release
        uses: softprops/action-gh-release@v2
        with:
          tag_name:  v${{ env.VERSION }}-${{ env.SHORT_SHA }}
          name:      "limm VPN ${{ env.VERSION }}"
          body:      "Auto-build from commit ${{ github.sha }}"
          files:     build/${{ env.DMG_NAME }}
          prerelease: false
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
